<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NurAzkar</title>
  <meta name="theme-color" content="#1f1a17" />
  <link rel="manifest" href="/static/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/static/icon-192.png" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-wrap">
        <a href="/" class="back-btn">←</a>
        <div>
          <div class="brand-title">NurAzkar</div>
          <div class="brand-subtitle">Азкары</div>
        </div>
      </div>

      <div class="topbar-actions">
        <button class="icon-btn" id="themeToggle" aria-label="Переключить тему">🌙</button>

        <div class="menu-wrap">
          <button class="icon-btn" id="menuToggle" aria-label="Открыть меню">⚙️</button>
          <div class="menu-dropdown" id="menuDropdown">
            <div class="menu-card">
              <div class="menu-title">Контакты</div>
              <a href="https://instagram.com/vainakhsky" target="_blank" rel="noopener">@vainakhsky</a>
              <a href="https://t.me/m_shamaev" target="_blank" rel="noopener">@m_shamaev</a>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="azkar-list">
      {{range .}}
      <article class="azkar-card fade-in" data-repeat="{{.Repeat}}">
        <div class="card-top">
          {{if .Title}}<div class="repeat-badge">{{.Title}}</div>{{end}}
        </div>

        <div class="arabic-text">{{.Arabic}}</div>
        <div class="transcription-text">{{.Transcription}}</div>
        <div class="translation-text">{{.Translation}}</div>

        <div class="tasbih-box">
          <div class="tasbih-progress">
            <svg viewBox="0 0 120 120" class="progress-ring">
              <circle class="ring-bg" cx="60" cy="60" r="52"></circle>
              <circle class="ring-fill" cx="60" cy="60" r="52"></circle>
            </svg>
            <div class="progress-center">
              <div class="count-value">0</div>
              <div class="count-total">/ <span class="target-value">{{.Repeat}}</span></div>
            </div>
          </div>

          <div class="tasbih-actions">
            <button class="count-btn minus-btn">−1</button>
            <button class="count-btn plus-btn">+1</button>
            <button class="count-btn reset-btn">Сброс</button>
          </div>
        </div>
      </article>
      {{end}}
    </main>

    <nav class="bottom-nav">
      <a href="/" class="nav-item">
        <span>🏠</span>
        <span>Главная</span>
      </a>
      <a href="/morning" class="nav-item">
        <span>☀️</span>
        <span>Утренние</span>
      </a>
      <a href="/evening" class="nav-item">
        <span>🌙</span>
        <span>Вечерние</span>
      </a>
    </nav>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
