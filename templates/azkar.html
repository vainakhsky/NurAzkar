<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NurAzkar</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-wrap">
        <a href="/" class="back-btn">←</a>
        <div>
          <div class="brand-title">NurAzkar</div>
          <div class="brand-subtitle">Азкары</div>
        </div>
      </div>
    </header>

    <main class="azkar-list">
      {{range .}}
      <article class="azkar-card" style="margin-bottom:20px;">
        <div class="repeat-badge" style="margin-bottom:12px;">Повтор: {{.Repeat}}</div>

        <div class="arabic-text">{{.Arabic}}</div>
        <div class="transcription-text">{{.Transcription}}</div>
        <div class="translation-text">{{.Translation}}</div>
      </article>
      {{end}}
    </main>
  </div>
</body>
</html>
