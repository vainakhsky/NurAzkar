<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NurAzkar</title>
  <meta name="theme-color" content="#1f1a17" />
  <link rel="manifest" href="/static/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/static/icon-192.png" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-wrap">
        <a href="/" class="back-btn">←</a>
        <div>
          <div class="brand-title">NurAzkar</div>
          <div class="brand-subtitle">Азкары</div>
        </div>
      </div>
    </header>

    <main class="azkar-list">
      {{range .}}
      <article class="azkar-card fade-in" data-repeat='{{index . "repeat"}}'>
        <div class="card-top">
          <div class="repeat-badge">Повтор: {{index . "repeat"}}</div>
        </div>

        <div class="arabic-text">{{index . "arabic"}}</div>
        <div class="transcription-text">{{index . "transcription"}}</div>
        <div class="translation-text">{{index . "translation"}}</div>

        <div class="tasbih-box">
          <div class="tasbih-progress">
            <svg viewBox="0 0 120 120" class="progress-ring">
              <circle class="ring-bg" cx="60" cy="60" r="52"></circle>
              <circle class="ring-fill" cx="60" cy="60" r="52"></circle>
            </svg>
            <div class="progress-center">
              <div class="count-value">0</div>
              <div class="count-total">/ <span class="target-value">{{index . "repeat"}}</span></div>
            </div>
          </div>

          <div class="tasbih-actions">
            <button class="count-btn minus-btn">−1</button>
            <button class="count-btn plus-btn">+1</button>
            <button class="count-btn reset-btn">Сброс</button>
          </div>
        </div>
      </article>
      {{end}}
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
