<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#8e745b" />
  <title>{{.AppName}}</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <div class="eyebrow">Ежедневные азкары</div>
        <h1>{{.AppName}}</h1>
      </div>
      <button id="settingsBtn" class="icon-button" aria-label="Открыть настройки">⚙</button>
    </header>

    <section class="hero-card">
      <div class="hero-pattern"></div>
      <div class="hero-content">
        <p class="hero-kicker">Утро и вечер</p>
        <h2>Красивый формат как приложение</h2>
        <p>Выбери раздел, читай азкары, отмечай количество повторов и устанавливай сайт на телефон.</p>
        <div class="home-actions">
          <button class="primary-pill" data-view="morning">☀️ Утренние</button>
          <button class="primary-pill secondary" data-view="evening">🌙 Вечерние</button>
        </div>
      </div>
    </section>

    <main id="content" class="content"></main>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-view="morning">☀️<span>Утро</span></button>
      <button class="nav-btn" data-view="evening">🌙<span>Вечер</span></button>
    </nav>
  </div>

  <aside id="drawer" class="drawer" aria-hidden="true">
    <div class="drawer-backdrop" id="drawerBackdrop"></div>
    <div class="drawer-panel">
      <div class="drawer-head">
        <h3>Контакты</h3>
        <button id="closeDrawer" class="icon-button" aria-label="Закрыть">✕</button>
      </div>
      <div class="contact-card">
        <div class="contact-label">Instagram</div>
        <div class="contact-value">@vainakhsky</div>
      </div>
      <div class="contact-card">
        <div class="contact-label">Telegram</div>
        <div class="contact-value">@m_shamaev</div>
      </div>
      <p class="drawer-note">Сделано в мягком восточном бежевом стиле для NurAzkar.</p>
    </div>
  </aside>

  <script src="/static/app.js"></script>
</body>
</html>
